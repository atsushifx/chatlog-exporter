# src: ./assets/prompts/category-rules.yaml
# @(#) typeごとのcategory判定フォーカスガイド
#
# 構造: type → フォーカスガイド文字列（プロンプトに直接埋め込まれる）
#
# 目的:
#   typeはcategoryを「決めない」。typeは「何に注目してcategoryを判断するか」のヒントを与えるだけ。
#   categoryはログの内容・対象ドメインから独立して決定される。

execution: |
  Focus: Look at the FILE PATHS and TARGETS that were modified.
  - Files under `.github/workflows/`, `.github/` → infrastructure
  - Files under `scripts/`, `src/`, `lib/`, `packages/` → development
  - Config files (`*.config.*`, `.eslintrc`, `mise.toml`, `deno.json`, etc.) → tooling
  - Prompt files, AI-related scripts, LLM integrations → ai
  - Documentation files only (`.md`, `.rst`, no code) → writing
  Priority: If multiple file types appear, use the DOMINANT type by volume or primary purpose.

incident: |
  Focus: Look at WHERE the error OCCURRED or what system FAILED.
  - CI pipeline failure, GitHub Actions error, workflow job failure → infrastructure
  - Local CLI tool error, shell command failure, config parsing error → tooling
  - Runtime code error, application crash, test failure → development
  - AI API error, LLM agent failure, prompt execution failure → ai
  Priority: Use the LOCATION OF FAILURE as the primary signal, not the tool used to diagnose it.

discussion: |
  Focus: Look at the SUBJECT MATTER being decided or discussed.
  - CI/CD operations, deployment policy, release process → infrastructure
  - API design, code architecture, algorithm design, module structure → development
  - Tool selection, dev environment setup, workflow tooling → tooling
  - AI usage policy, agent design, prompt strategy, LLM integration → ai
  - General knowledge sharing, concept clarification, learning → knowledge
  - Document structure, writing style, content strategy → writing
  Priority: Use the DOMAIN OF THE DECISION, not the format of the discussion.

research: |
  Focus: Look at the TECHNOLOGY or CONCEPT being researched.
  - GitHub Actions, CI/CD systems, deployment pipelines → infrastructure
  - ShellSpec, mise, asdf, package managers, CLI tools → tooling
  - Programming languages, algorithms, frameworks, libraries → development
  - LLM, prompt engineering, AI agents, Claude API → ai
  - General software engineering concepts, design patterns → knowledge
  - Writing techniques, documentation styles → writing
  Priority: Use the SUBJECT DOMAIN of the research target, not the method used to research it.

writing: |
  Focus: Look at the TYPE OF DOCUMENT being written.
  - Publicly visible documents (README, blog post, tutorial, release notes) → writing
  - Architecture / design specification documents (ADR, tech spec) → development
  - Operations runbook, CI documentation, deployment guide → infrastructure
  - Prompt files, AI usage guides, agent specifications → ai
  Priority: If the document IS the deliverable (not a record of decisions), use `writing`.
  Only use other categories if the document IS an internal specification that drives implementation.
