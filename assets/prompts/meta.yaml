# src: ./assets/prompts/meta.yaml
# @(#) Phase 3b: フロントマター生成プロンプトテンプレート
#
# 変数:
#   ${log_type}        — 判定済みtype
#   ${log_category}    — 判定済みcategory
#   ${log_interaction} — 判定済みinteraction
#   ${topic_list}      — topics.dic から生成したtopic一覧（when/not付き）
#   ${tags_list}       — tags.dic から生成したtag一覧（カンマ区切り）
#   ${body}            — ログ本文

system: |
  You are a metadata generator for engineering logs.
  Output YAML only. No code fences, no extra text. No questions, no explanations.

user: |
  Generate metadata for the following engineering log.

  Log type: ${log_type}
  Log category: ${log_category}

  General requirements:
  - Summary must read as a log summary (what happened, what was done, what was found)
  - Tags must be chosen only from the provided list based on actual content appearance
  - Output YAML only. No code fences, no extra text.
  - Do NOT ask questions. Do NOT add explanations. Generate metadata from the log as-is.

  ## TOPICS ASSIGNMENT RULES

  ### TOPICS STRUCTURE (2-layer)
  Topics follow a 2-layer structure:
  - Layer 1 — domain: the genre of this log (EXACTLY ONE, REQUIRED)
  - Layer 2 — aspect: the angle or mode of interaction (0–2, OPTIONAL)

  ### RULES
  RULE 1: Select EXACTLY ONE domain.
  RULE 2: Select 0–2 aspects ONLY when they add a significant angle not covered by domain.
  RULE 3: NEVER put tech keywords (git, yaml, powershell, shell, etc.) in topics — use tags only.
  RULE 4: Total maximum 3 topics (domain 1 + aspect 0–2).
  RULE 5: Choose domain by "what this log EXISTS FOR" — purpose over surface action.
           Do NOT pick by tool used, conversation style, or what was done.
           Example: AI roleplay with design discussion → domain=ai + aspect=discussion (NOT game)
  RULE 6 (chat → discussion upgrade): Ask "Did the questions EVOLVE across turns?"
    - chat       = turns repeat the same dimension (emotion/action, no depth change)
    - discussion = question granularity, angle, or scope changed across turns
    Upgrade to discussion if ANY turn involved tech selection, design judgment, or policy examination,
    even when roleplay or casual chat is mixed in.

  ### Available topics
  ${topic_list}

  IMPORTANT: Topics express WHAT THE LOG'S ATTENTION WAS FOCUSED ON, not the problem type.
  - Do NOT use tech names (git, yaml, etc.) in topics — put them in tags.
  - Do NOT map type to topics (e.g. type=incident → topics=behavior is OK only if behavior was the actual focus).
  - Choose domain by asking: "What was the main concern?" not "What was the action?"

  Schema:
  title: string
  summary: |
    string (multiline, 2-4 sentences)
  topics:
    - string  # follow the when/not rules above
  tags:
    - string  # must be from: ${tags_list}

  ---
  ${body}
